<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plaster&family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#FF4C4C">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <link rel="stylesheet" href="styles/style.css"/>
  <title>Hourse - Home</title>
</head>
<body>
  <!--<div class="reveal">-->
  <link rel="stylesheet" href="https://fonts.googleapis.com">
  <nav class="navbar">
    <div class="nav-btn">
      <div onclick="home()">
    <svg viewBox="0 0 24 24" class="icon">
  <!-- Corpo do controle -->
  <path d="M6 8h12c2 0 3.5 1.5 4 3.5l.5 2c.3 1.5-.8 2.5-2 2.5h-1.5c-.8 0-1.5-.4-1.8-1l-.5-1c-.3-.5-.8-.8-1.4-.8H9.2c-.6 0-1.1.3-1.4.8l-.5 1c-.3.6-1 1-1.8 1H3.5c-1.2 0-2.3-1-2-2.5l.5-2C2.5 9.5 4 8 6 8z"/>
  
  <!-- Direcional  -->
  <rect x="6" y="10" width="4" height="1.5" fill="#0D0D0D"/>
  <rect x="7.25" y="8.75" width="1.5" height="4" fill="#0D0D0D"/>
  
  <!-- Botões  -->
  <circle cx="17" cy="10" r="1" fill="#0D0D0D"/>
  <circle cx="19" cy="12" r="1" fill="#0D0D0D"/>
</svg>
      <span class="games">Jogos</span>
      </div>
  </div>
    <div class="nav-btn">
    <svg viewBox="0 0 24 24" class="icon-p">
  <!-- Círculo (só borda) -->
  <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
  
  <!-- Triângulo -->
  <path d="M10 8l6 4-6 4z" fill="currentColor"/>
</svg>
      <span class="fast-play">Jogar</span>
  </div>
    <div class="nav-btn">
    <svg viewBox="0 0 24 24" class="icon-pr">
  <!-- Caixa -->
  <rect x="4" y="10" width="16" height="10" rx="2" fill="currentColor"/>

  <!-- Tampa -->
  <rect x="3" y="7" width="18" height="4" rx="1.5" fill="currentColor"/>

  <!-- Laço vertical -->
  <rect x="11" y="7" width="2" height="13" fill="#0D0D0D"/>

  <!-- Laço horizontal -->
  <rect x="4" y="12" width="16" height="2" fill="#0D0D0D"/>

  <!-- Parte do laço (topo) -->
  <path d="M12 7c-1.5-2-4-2-4 0 0 1.5 2 2 4 2s4-.5 4-2c0-2-2.5-2-4 0z" fill="currentColor" opacity="1.0"/>
</svg>
      <span class="recos">Recompensas</span>
  </div>
  </nav>
  <section class="head">
    <h1 class="pg-title sekuya">Hourse</h1>
    <p class="desc">Olá, seja bem-vindo<br> onde a sorte encontra a diversão.</p>
    <details class="meu-details">
      <summary class="meu-summary sekuya">Moeda</summary>
      <div class="details-info">
        <label class="radio">
          <input type="radio" name="opcao" onclick="setMoedaR()">
          REAIS     
          <span class="check"></span>
        </label>
        <label class="radio">
          <input type="radio" name="opcao" onclick="setMoedaT()" id="ts">
          THAISINHAS
          <span class="check"></span>
        </label>
      </div>
    </details>
      <button class="btn-jogar" onclick="gameBomb()">JOGAR AGORA</button>
    
  </section>
  <div class="dados-game sekuya">
    <h1>Dado da Sorte</h1>
  </div>
  <div class="jokenpo-game sekuya">
    <h1>Jokenpô</h1>
  </div> 
  <div class="memoria-game sekuya">
    <h1>Jogo da Memória</h1>
  </div>
  <div class="bomb-game sekuya" onclick="gameBomb()">
    <h1>Campo Minado</h1>
  </div>
  <div class="hourse-bar sekuya">
    <h1>.</h1>
    <h1>.</h1>
    <h1>.</h1>
    <h1>.</h1>
    <h1>.</h1>
    <h1>.</h1>
  </div>
  <div class="grafic-game sekuya">
    <h1>Em Breve</h1>
  </div>
  <div class="timing-game sekuya">
    <h1>Em Breve</h1>
  </div>
  <div class="run-game sekuya">
    <h1>Em Breve</h1>
  </div>
  <div class="clicker-game sekuya">
    <h1>Em Breve</h1>
  </div>
  <div class="soon-game sekuya">
    <h1>Em Breve</h1>
  </div>
  <div class="breve-game sekuya">
    <h1>Em Breve</h1>
  </div>
  <div class="final-line"></div>
  <p class="dev">Desenvolvido por Ivan Cruz.</p>
  <div class="dev-line"></div>
  <div class="dev-line2"></div>
  <button class="feedback" onclick="feedback()">Avaliar APP</button>
  <!--</div>-->
  <script src="scripts/script.js"></script>
</body>
</html>
